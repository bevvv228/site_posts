<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная</title>
    <style>
        /* ----- RESET & БАЗОВЫЕ СТИЛИ ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f7fc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: #1a2c3e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        /* КАРТОЧКА ГЛАВНОЙ */
        .home-card {
            max-width: 520px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.01);
            padding: 2rem 2rem 2.2rem;
            transition: all 0.2s ease;
        }

        /* ЗАГОЛОВОК */
        h2 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #0f2b3d;
            margin-bottom: 1rem;
            border-left: 4px solid #3b82f6;
            padding-left: 1rem;
        }

        /* ПРИВЕТСТВИЕ */
        .greeting {
            font-size: 1rem;
            background: #f8fafd;
            padding: 0.9rem 1rem;
            border-radius: 20px;
            margin: 1.2rem 0 1.5rem 0;
            color: #2c4c6e;
            border: 1px solid #e4edf5;
            font-weight: 450;
        }

        /* ССЫЛКА НА ПОСТЫ — ВЫДЕЛЕННАЯ КНОПКА */
        .posts-link {
            display: inline-block;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-size: 0.95rem;
            transition: background 0.2s, transform 0.05s;
            margin-bottom: 1.8rem;
            border: none;
            cursor: pointer;
            text-align: center;
        }
        .posts-link:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        /* БЛОК ССЫЛОК АВТОРИЗАЦИИ */
        .auth-links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 0.5rem;
            padding-top: 1rem;
            border-top: 1px solid #e9edf2;
        }
        .auth-links a {
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.45rem 1.2rem;
            border-radius: 40px;
            background: #f1f5f9;
            color: #1f4a76;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .auth-links a:hover {
            background: #e2e8f0;
            border-color: #cbdde9;
            transform: translateY(-1px);
        }
        /* стили для logout (include) будут наследоваться */
        .auth-links .logout-link,
        .auth-links a[href="/logout"] {
            background: #fee8e8;
            color: #b91c1c;
        }
        .auth-links .logout-link:hover,
        .auth-links a[href="/logout"]:hover {
            background: #fed7d7;
        }

        /* небольшая адаптация */
        @media (max-width: 500px) {
            .home-card {
                padding: 1.5rem;
            }
            h2 {
                font-size: 1.6rem;
            }
        }

        /* чёткие границы и текст — используем subpixel rendering */
        body, button, input, a {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body>
<div class="home-card">
    <h2>Главная</h2>
    <div class="greeting">
        Привет, {{ user.username|default:"Гость" }}!
    </div>
    <a href="posts" class="posts-link">📄 Посты</a><div class="auth-links">
        {% if user.is_authenticated %}
            {% include "logout.html" %}
            <a href="/reset_password">Сменить пароль</a>
        {% else %}
            <a href="/login">Войти</a>
            <a href="/register">Регистрация</a>
        {% endif %}
    </div>
</div>
</body>
</html>
