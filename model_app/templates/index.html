<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f6fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .home-card {
            background: #ffffff;
            max-width: 500px;
            width: 100%;
            padding: 2rem 2rem 2.2rem;
            border-radius: 32px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.01);
            text-align: center;
        }

        h2 {
            font-size: 2rem;
            font-weight: 600;
            color: #0f2b3d;
            margin-bottom: 1rem;
            letter-spacing: -0.3px;
        }

        .greeting {
            font-size: 1.1rem;
            color: #2c3e50;
            background: #f8fafd;
            padding: 0.8rem 1rem;
            border-radius: 60px;
            margin: 1rem 0 1.8rem 0;
            display: inline-block;
            width: auto;
        }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            margin: 1.5rem 0 1.2rem;
        }

        .nav-buttons a, .logout-link {
            display: inline-block;
            text-decoration: none;
            font-weight: 500;
            padding: 0.7rem 1rem;
            border-radius: 48px;
            transition: all 0.2s ease;
            background: #f1f5f9;
            color: #1f3a5f;
            font-size: 0.95rem;
        }

        .nav-buttons a:hover {
            background: #e2e8f0;
            transform: translateY(-1px);
        }

        .primary-link {
            background: #3b82f6;
            color: white !important;
        }

        .primary-link:hover {
            background: #2563eb;
        }

        .logout-style {
            background: #fee2e2;
            color: #b91c1c;
        }

        .logout-style:hover {
            background: #fecaca;
        }

        hr {
            margin: 1rem 0;
            border: none;
            border-top: 1px solid #eef2f8;
        }

        .footer-note {
            font-size: 0.75rem;
            color: #8ba0bc;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
<div class="home-card">
    <h2>Главная</h2>
    <div class="greeting">
        Привет, {{ user.username|default:"Гость" }}!
    </div>

    <div class="nav-buttons">
        <a href="posts" class="primary-link">📝 Посты</a>
    </div>

    {% if user.is_authenticated %}
        <div class="nav-buttons">
            {% include "logout.html" %}
            <a href="/reset_password">Сменить пароль</a>
        </div>
    {% else %}
        <div class="nav-buttons">
            <a href="/login">Войти</a>
            <a href="/register">Регистрация</a>
        </div>
    {% endif %}

    <div class="footer-note">
