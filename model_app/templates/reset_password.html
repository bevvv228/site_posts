<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Смена пароля</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f4f6fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .reset-card {
            background: white;
            max-width: 460px;
            width: 100%;
            padding: 2rem 1.8rem;
            border-radius: 32px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.05);
            text-align: center;
        }
        h2 {
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: #0f2b3d;
        }
        form p {
            margin-bottom: 1rem;
            text-align: left;
        }
        label {
            font-weight: 500;
            font-size: 0.85rem;
            color: #2c3e50;
            display: block;
            margin-bottom: 0.3rem;
        }
        input {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid #cfdee9;
            border-radius: 24px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        input[type="submit"] {
            background: #3b82f6;
            color: white;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        input[type="submit"]:hover {
            background: #2563eb;
        }
        .back-link {
            margin-top: 1.5rem;
        }
        .back-link a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="reset-card">
    <h2>Смена пароля</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Сменить">
    </form>
    <p class="back-link"><a href="/">Вернуться на главную</a></p>
</div>
</body>
</html>
